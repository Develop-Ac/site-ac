server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compressão
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/javascript
        application/javascript application/json
        image/svg+xml;

    # Não cachear o HTML (pega sempre a versão mais nova)
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # CSS e JS são versionados (?v=) — pode cachear forte
    location ~* \.(css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Imagens / fontes / vídeo — cache moderado (7 dias)
    location ~* \.(png|jpe?g|gif|svg|ico|webp|woff2?|ttf|mp4|webm)$ {
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Página principal (SPA-like fallback para uma página só)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Esconde versão do nginx
    server_tokens off;
}
